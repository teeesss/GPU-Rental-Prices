<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neocloud Intel | GPU Rental Index V4.2.1</title>
    <meta name="description" content="Verified GPU rental price index tracking H100, H200, B200, GH200 and AMD MI325X/MI355X across Neocloud providers.">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --surface-raised: #111111;
            --glass-border: rgba(255,255,255,0.08);
            --accent: #76b900;
            --accent-glow: rgba(118,185,0,0.15);
            --text-main: #f0f0f0;
            --text-dim: #555;
            --text-mid: #888;
            --mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            padding: 12px 16px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow: auto;
        }

        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 12px;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo h1 { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
        .logo-sep { color: var(--glass-border); font-size: 16px; font-weight: 200; }
        .logo span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .header-meta { display: flex; align-items: center; gap: 16px; font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
        .header-meta a { color: var(--accent); text-decoration: none; font-weight: 700; border-bottom: 1px solid transparent; transition: all 0.2s; }
        .header-meta a:hover { border-color: var(--accent); }

        .live-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.4; transform:scale(0.8);} }

        /* ── Data Grid ── */
        .stat-bar {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-left: 8px solid var(--card-color, var(--accent));
            padding: 10px 8px;
            border-radius: 4px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card .label { font-family: var(--mono); font-size: 8px; color: var(--card-color, var(--accent)); text-transform: uppercase; margin-bottom: 4px; display: block; font-weight: 700; }
        .stat-card .value { font-size: 22px; font-weight: 800; color: #fff; line-height: 1; display: block; letter-spacing: -0.5px; }
        .stat-card .meta { font-size: 8px; color: var(--text-mid); margin-top: 6px; display: block; }

        /* ── Layout ── */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 16px;
            min-height: calc(100vh - 120px);
        }

        @media (min-width: 1024px) {
            .main-grid { height: calc(100vh - 140px); min-height: 0; }
        }

        /* Compact Mode for Small Height Desktops */
        @media (min-width: 1024px) and (max-height: 850px) {
            header { margin-bottom: 8px; padding-bottom: 4px; }
            .stat-bar { margin-bottom: 8px; }
            .stat-card { padding: 6px 4px; }
            .stat-card .value { font-size: 18px; }
            .stat-card .label { font-size: 7px; margin-bottom: 2px; }
            .box { padding: 10px; }
            .box-header { margin-bottom: 8px; padding-bottom: 4px; }
        }

        .box {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        .box-title { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        
        .chart-container { flex: 1; position: relative; min-height: 0; }
        #intelChart { height: 100% !important; width: 100% !important; }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            min-height: 0;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .section-header { font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px 0; border-bottom: 1px solid var(--accent-glow); padding-bottom: 4px; }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .chip { font-family: var(--mono); font-size: 8px; padding: 2px 6px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: var(--text-mid); cursor: pointer; border-radius: 2px; text-transform: uppercase; }
        .chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

        table { width: 100%; border-collapse: collapse; }
        th { font-family: var(--mono); text-align: left; padding: 6px 4px; font-size: 8px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
        td { padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 10px; font-family: var(--mono); }
        .badge { background: var(--accent-glow); color: var(--accent); padding: 2px 4px; border-radius: 2px; font-weight: 700; font-size: 9px; }

        #latest-table-container { 
            max-height: 180px; 
            overflow-y: auto; 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-bottom: 12px;
        }
        #latest-table-container::-webkit-scrollbar { width: 3px; }
        #latest-table-container::-webkit-scrollbar-thumb { background: var(--glass-border); }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Neocloud Intel</h1>
            <span class="logo-sep">/</span>
            <span>GPU Rental Price Index</span>
        </div>
        <div class="header-meta">
            <span><span class="live-dot"></span>Live</span>
            <span id="sync-status">Ready</span>
            <span id="record-count"></span>
            <a href="database/gpu_intel.js" target="_blank">RAW_DATA_NODE</a>
        </div>
    </header>

    <div class="stat-bar" id="top-stats"></div>

    <div class="main-grid">
        <div class="box">
            <div class="box-header">
                <span class="box-title">Institutional Price History</span>
                <div class="filter-bar" id="filter-bar"></div>
            </div>
            <div class="chart-container">
                <canvas id="intelChart"></canvas>
            </div>
        </div>

        <div class="box">
            <div class="box-header">
                <span class="box-title">Market Intelligence</span>
            </div>
            <div class="sidebar-scroll">
                <div class="section-header">Historical Index (Avg)</div>
                <div id="market-stats"></div>
                
            </div>
        </div>
    </div>

    <script>
        const colors = {
            'H100': '#76b900', 'H200': '#00a3e0', 'GB200': '#c084fc',
            'B200': '#fb923c', 'GH200': '#2dd4bf', 'MI355X': '#f43f5e',
            'MI325X': '#facc15', 'B300': '#4ade80', 'A100': '#94a3b8'
        };

        async function init() {
            const syncStatus = document.getElementById('sync-status');
            syncStatus.textContent = 'Syncing...';
            
            const summaryScript = document.createElement('script');
            summaryScript.src = 'database/gpu_intel.js?t=' + Date.now();
            document.head.appendChild(summaryScript);

            summaryScript.onload = () => {
                const data = window.GPU_INTEL;
                syncStatus.textContent = 'Live • ' + new Date().toLocaleTimeString();
                
                const models = ['H100','H200','GB200','B200','GH200','MI355X','MI325X','B300','A100'];
                const get = (m) => data.stats.find(s => s.gpu === m);

                document.getElementById('top-stats').innerHTML = models.map(m => {
                    const s = get(m);
                    if (!s) return '';
                    return `
                        <div class="stat-card" style="--card-color: ${colors[m]}">
                            <span class="label">${m}</span>
                            <span class="value">$${s.avg_price.toFixed(2)}</span>
                            <span class="meta">${s.source_count} Sources</span>
                        </div>
                    `;
                }).join('');

                renderMarketStats(data.stats);
                renderLatestTable(data.latest);
                
                const historyScript = document.createElement('script');
                historyScript.src = 'database/gpu_history.js?t=' + Date.now();
                document.head.appendChild(historyScript);
                
                historyScript.onload = () => {
                    const histData = window.GPU_HISTORY.history;
                    document.getElementById('record-count').textContent = histData.length + ' data nodes';
                    renderChart(histData);
                    renderFilters(models, histData);
                };
            };
        }

        let sortConfig = { key: 'avg_price', dir: 'desc' };

        function renderMarketStats(stats) {
            const container = document.getElementById('market-stats');
            
            // Apply sorting
            const sorted = [...stats].sort((a, b) => {
                let valA = a[sortConfig.key];
                let valB = b[sortConfig.key];
                if (typeof valA === 'string') {
                    return sortConfig.dir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
                return sortConfig.dir === 'asc' ? valA - valB : valB - valA;
            });
            
            const getIndicator = (key) => {
                if (sortConfig.key !== key) return '↕';
                return sortConfig.dir === 'asc' ? '↑' : '↓';
            };

            // Header Row with click handlers
            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;">
                    <span onclick="toggleSort('gpu')" style="font-family: var(--mono); font-size: 8px; color: var(--text-dim); width: 45px;">${getIndicator('gpu')} MODEL</span>
                    <span onclick="toggleSort('avg_price')" style="font-family: var(--mono); font-size: 8px; color: var(--text-dim); width: 55px; text-align: center;">${getIndicator('avg_price')} AVG</span>
                    <span onclick="toggleSort('chg_1m')" style="font-family: var(--mono); font-size: 8px; color: var(--text-dim); width: 55px; text-align: center;">${getIndicator('chg_1m')} 1M</span>
                    <span onclick="toggleSort('chg_1y')" style="font-family: var(--mono); font-size: 8px; color: var(--text-dim); width: 55px; text-align: center;">${getIndicator('chg_1y')} 1Y</span>
                    <span style="font-family: var(--mono); font-size: 8px; color: var(--text-dim); flex: 1; text-align: right;">RANGE</span>
                </div>
            `;
            
            html += sorted.map(s => {
                const chg1m = s.chg_1m || 0;
                const chg1y = s.chg_1y || 0;
                const c1mColor = chg1m > 0 ? '#4ade80' : (chg1m < 0 ? '#f43f5e' : 'var(--text-dim)');
                const c1yColor = chg1y > 0 ? '#4ade80' : (chg1y < 0 ? '#f43f5e' : 'var(--text-dim)');
                const s1m = chg1m > 0 ? '+' : '';
                const s1y = chg1y > 0 ? '+' : '';
                
                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02);">
                        <span style="font-family: var(--mono); font-size: 11px; color: ${colors[s.gpu]}; width: 45px;">${s.gpu}</span>
                        <span style="font-family: var(--mono); font-size: 11px; font-weight: 700; width: 55px; text-align: center;">$${s.avg_price.toFixed(2)}</span>
                        <span style="font-family: var(--mono); font-size: 10px; font-weight: 700; color: ${c1mColor}; width: 55px; text-align: center;">${s1m}${chg1m.toFixed(1)}%</span>
                        <span style="font-family: var(--mono); font-size: 10px; font-weight: 700; color: ${c1yColor}; width: 55px; text-align: center;">${s1y}${chg1y.toFixed(1)}%</span>
                        <span style="font-size: 10px; color: var(--text-dim); flex: 1; text-align: right;">$${s.min_price.toFixed(2)}-$${s.max_price.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }

        function toggleSort(key) {
            if (sortConfig.key === key) {
                sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.dir = 'desc';
            }
            renderMarketStats(window.GPU_INTEL.stats);
        }

        function renderLatestTable(latest) {
            // Deprecated: Source URLs are available in the RAW_DATA_NODE link
        }

        let chart = null;
        function renderChart(history) {
            const ctx = document.getElementById('intelChart').getContext('2d');
            if (chart) chart.destroy();
            const gpus = [...new Set(history.map(r => r.gpu))];
            
            const datasets = [];
            
            gpus.forEach(gpu => {
                // 1. Provider Average (Solid)
                const providerData = history.filter(r => r.gpu === gpu && r.category !== 'Index')
                    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

                if (providerData.length > 0) {
                    const daily = {};
                    providerData.forEach(r => {
                        const d = new Date(r.timestamp);
                        const dayKey = d.toISOString().split('T')[0];
                        if (!daily[dayKey]) daily[dayKey] = { sum: 0, count: 0, date: d };
                        daily[dayKey].sum += r.price_hourly;
                        daily[dayKey].count += 1;
                    });
                    const rawPoints = Object.values(daily).sort((a,b) => a.date - b.date).map(d => ({ x: d.date, y: d.sum / d.count }));
                    
                    // Apply 5-day SMA Smoothing
                    const smoothedPoints = rawPoints.map((p, i, arr) => {
                        const window = arr.slice(Math.max(0, i - 4), i + 1);
                        const avg = window.reduce((sum, curr) => sum + curr.y, 0) / window.length;
                        return { x: p.x, y: avg };
                    });

                    datasets.push({
                        label: `${gpu} (Avg)`,
                        data: smoothedPoints,
                        borderColor: colors[gpu] || '#fff',
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, 'transparent');
                            gradient.addColorStop(1, (colors[gpu] || '#fff') + '15');
                            return gradient;
                        },
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    });
                }

                // 2. Market Index (Dashed)
                const indexData = history.filter(r => r.gpu === gpu && r.category === 'Index')
                    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

                if (indexData.length > 0) {
                    const points = indexData.map(r => ({ x: new Date(r.timestamp), y: r.price_hourly }));
                    datasets.push({
                        label: `${gpu} Index`,
                        data: points,
                        borderColor: (colors[gpu] || '#fff') + '88',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.1,
                        pointRadius: 0,
                        borderWidth: 1.5
                    });
                }
            });

            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(10,10,10,0.9)',
                            titleFont: { family: 'JetBrains Mono', size: 10 },
                            bodyFont: { family: 'JetBrains Mono', size: 11 },
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: (ctx) => ` ${ctx.dataset.label}: $${Number(ctx.raw.y).toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: { 
                            type: 'time', 
                            time: { unit: 'month' }, 
                            grid: { display: false }, 
                            ticks: { font: { family: 'JetBrains Mono', size: 9 }, color: '#bbb' },
                            min: new Date(new Date().setFullYear(new Date().getFullYear() - 1)).toISOString() // Focus on last 12 months
                        },
                        y: { 
                            type: 'logarithmic',
                            min: 0.4, 
                            grid: { color: 'rgba(255,255,255,0.03)' }, 
                            ticks: { 
                                font: { family: 'JetBrains Mono', size: 9 }, 
                                color: '#bbb', 
                                callback: (v) => {
                                    const val = Number(v);
                                    if (val === 0.5) return '$0.50';
                                    if (val === 1 || val === 2 || val === 3 || val === 4 || val === 5 || val === 10 || val === 20 || val === 30) {
                                        return '$' + val;
                                    }
                                    return null;
                                } 
                            } 
                        }
                    }
                }
            });
        }

        function renderFilters(models, history) {
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = '<div class="chip active" onclick="filterGPU(\'all\', event)">All</div>';
            models.forEach(m => {
                bar.innerHTML += `<div class="chip" onclick="filterGPU('${m}', event)">${m}</div>`;
            });
        }

        window.filterGPU = (gpu, e) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            e.currentTarget.classList.add('active');
            chart.data.datasets.forEach(ds => { 
                ds.hidden = (gpu !== 'all' && !ds.label.startsWith(gpu)); 
            });
            chart.update();
        };

        init();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</body>
</html>
